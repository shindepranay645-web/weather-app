<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <div class="weather-card"> 
     <button id="themeToggle">Dark Mode</button>
     <div class="search">
         <input  type="text" placeholder="Enter city name">
         <button><img src="image/search.png"></button>
     </div>
     
     <button id="gps-Button">📍 My location</button>

     <div class="weather">
        <img src="image/rain.png" class="weather-icon">
        <h1 class="temp">22°c</h1>
        <h2 class="city">chennai</h2>
     </div>

     <div class="details">
        <div class="col">
            <img src="image/humidity.png" alt="Humidity" width="25" height="25">
            <div>
                <p class="humidity">0%</p>
                <p>Humidity</p>
            </div>
        </div>

        <div class="col">
            <img src="image/wind.png" alt="wind">
            <div>
                <p class="wind">0 km/h</p>
                <p>Wind Speed</p>
            </div>
        </div>
     </div>

    </div>

     <script src="script.js"></script>

</body>
</html>
